# MCP Tool JSON Contracts
# Defines JSON Schema contracts for all agent tools with preferred executor tiers
# Source: ai-architecture.md Intent Dispatcher, 10-STRAT-PRD.md jobs, 34-arch-endpoints-schema.yaml

tools:
  - name: detect_conflicts
    description: Detect scheduling conflicts across calendar events and tasks
    preferred_executor: code
    input_schema:
      type: object
      properties:
        time_range:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
          required: [start, end]
        include_tasks:
          type: boolean
          default: true
        timezone:
          type: string
          default: UTC
      required: [time_range]
    output_schema:
      type: object
      properties:
        conflicts:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
                enum: [event, task]
              title:
                type: string
              start_time:
                type: string
                format: date-time
              end_time:
                type: string
                format: date-time
              severity:
                type: string
                enum: [low, medium, high, critical]
              conflicting_with:
                type: array
                items:
                  type: string
        total_conflicts:
          type: integer
      required: [conflicts, total_conflicts]
    error_responses:
      - code: INVALID_TIME_RANGE
        message: Start time must be before end time
      - code: TIMEZONE_INVALID
        message: Invalid timezone identifier

  - name: create_event
    description: Create a new calendar event
    preferred_executor: code
    input_schema:
      $ref: '#/components/schemas/EventCreate'
    output_schema:
      $ref: '#/components/schemas/Event'
    error_responses:
      - code: VALIDATION_ERROR
        message: Event validation failed
      - code: CONFLICT_DETECTED
        message: Event conflicts with existing events

  - name: update_event
    description: Update an existing calendar event
    preferred_executor: code
    input_schema:
      type: object
      properties:
        id:
          type: string
        updates:
          $ref: '#/components/schemas/EventUpdate'
      required: [id, updates]
    output_schema:
      $ref: '#/components/schemas/Event'
    error_responses:
      - code: EVENT_NOT_FOUND
        message: Event with specified ID not found
      - code: VALIDATION_ERROR
        message: Event validation failed

  - name: delete_event
    description: Delete a calendar event (soft delete)
    preferred_executor: code
    input_schema:
      type: object
      properties:
        id:
          type: string
        delete_series:
          type: boolean
          default: false
          description: Delete entire recurring series if true
      required: [id]
    output_schema:
      type: object
      properties:
        id:
          type: string
        deleted:
          type: boolean
        deleted_at:
          type: string
          format: date-time
      required: [id, deleted, deleted_at]
    error_responses:
      - code: EVENT_NOT_FOUND
        message: Event with specified ID not found

  - name: create_task
    description: Create a new task
    preferred_executor: code
    input_schema:
      $ref: '#/components/schemas/TaskCreate'
    output_schema:
      $ref: '#/components/schemas/Task'
    error_responses:
      - code: VALIDATION_ERROR
        message: Task validation failed
      - code: PROJECT_NOT_FOUND
        message: Project with specified ID not found

  - name: update_task
    description: Update an existing task
    preferred_executor: code
    input_schema:
      type: object
      properties:
        id:
          type: string
        updates:
          $ref: '#/components/schemas/TaskUpdate'
      required: [id, updates]
    output_schema:
      $ref: '#/components/schemas/Task'
    error_responses:
      - code: TASK_NOT_FOUND
        message: Task with specified ID not found
      - code: VALIDATION_ERROR
        message: Task validation failed

  - name: delete_task
    description: Delete a task (soft delete)
    preferred_executor: code
    input_schema:
      type: object
      properties:
        id:
          type: string
      required: [id]
    output_schema:
      type: object
      properties:
        id:
          type: string
        deleted:
          type: boolean
        deleted_at:
          type: string
          format: date-time
      required: [id, deleted, deleted_at]
    error_responses:
      - code: TASK_NOT_FOUND
        message: Task with specified ID not found

  - name: send_email
    description: Send an email via Nylas integration
    preferred_executor: code
    input_schema:
      $ref: '#/components/schemas/EmailSendRequest'
    output_schema:
      type: object
      properties:
        message_id:
          type: string
        sent_at:
          type: string
          format: date-time
        recipients:
          type: array
          items:
            type: string
      required: [message_id, sent_at, recipients]
    error_responses:
      - code: VALIDATION_ERROR
        message: Email validation failed
      - code: NYLAS_RATE_LIMIT
        message: Nylas API rate limit exceeded
      - code: ATTACHMENT_TOO_LARGE
        message: Attachment exceeds size limit

  - name: read_email
    description: Read email content and metadata
    preferred_executor: code
    input_schema:
      type: object
      properties:
        message_id:
          type: string
        account_id:
          type: string
        include_attachments:
          type: boolean
          default: false
      required: [message_id, account_id]
    output_schema:
      type: object
      properties:
        id:
          type: string
        subject:
          type: string
        from:
          type: string
        to:
          type: array
          items:
            type: string
        body:
          type: string
        received_at:
          type: string
          format: date-time
        attachments:
          type: array
          items:
            type: object
            properties:
              filename:
                type: string
              size:
                type: integer
              content_type:
                type: string
      required: [id, subject, from, to, body, received_at]
    error_responses:
      - code: MESSAGE_NOT_FOUND
        message: Email message not found
      - code: ACCOUNT_NOT_AUTHORIZED
        message: Account not authorized

  - name: search
    description: Search across messages, tasks, events, documents, and contacts
    preferred_executor: code
    input_schema:
      $ref: '#/components/schemas/SearchRequest'
    output_schema:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        total:
          type: integer
        query_time_ms:
          type: integer
      required: [results, total, query_time_ms]
    error_responses:
      - code: INVALID_QUERY
        message: Search query is invalid
      - code: SEARCH_TIMEOUT
        message: Search operation timed out

  - name: parse_email_intent
    description: Extract structured intent from email content (reschedule request, task creation, etc.)
    preferred_executor: lightweight_model
    input_schema:
      type: object
      properties:
        email_body:
          type: string
        email_subject:
          type: string
        context:
          type: object
          properties:
            user_timezone:
              type: string
            current_date:
              type: string
              format: date
      required: [email_body, email_subject]
    output_schema:
      type: object
      properties:
        intent_type:
          type: string
          enum: [reschedule_request, task_creation, meeting_request, information_request, unknown]
        confidence:
          type: number
          minimum: 0
          maximum: 1
        extracted_data:
          type: object
          additionalProperties: true
        suggested_actions:
          type: array
          items:
            type: string
      required: [intent_type, confidence, extracted_data]
    error_responses:
      - code: PARSING_FAILED
        message: Failed to parse email intent
      - code: LOW_CONFIDENCE
        message: Intent confidence below threshold

  - name: summarize_thread
    description: Summarize a chat thread or email thread
    preferred_executor: lightweight_model
    input_schema:
      type: object
      properties:
        thread_id:
          type: string
        thread_type:
          type: string
          enum: [chat, email]
        max_length:
          type: integer
          default: 200
      required: [thread_id, thread_type]
    output_schema:
      type: object
      properties:
        summary:
          type: string
        key_points:
          type: array
          items:
            type: string
        action_items:
          type: array
          items:
            type: string
        participants:
          type: array
          items:
            type: string
      required: [summary, key_points]
    error_responses:
      - code: THREAD_NOT_FOUND
        message: Thread not found
      - code: THREAD_EMPTY
        message: Thread contains no messages

  - name: classify_priority
    description: Classify the priority of a task or event
    preferred_executor: lightweight_model
    input_schema:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        context:
          type: object
          properties:
            due_date:
              type: string
              format: date-time
            project_priority:
              type: string
            stakeholder_level:
              type: string
      required: [title]
    output_schema:
      type: object
      properties:
        priority:
          type: string
          enum: [low, medium, high, critical]
        confidence:
          type: number
          minimum: 0
          maximum: 1
        reasoning:
          type: string
      required: [priority, confidence]
    error_responses:
      - code: CLASSIFICATION_FAILED
        message: Failed to classify priority

  - name: generate_response
    description: Generate a natural language response for user communication
    preferred_executor: powerful_model
    input_schema:
      type: object
      properties:
        context:
          type: string
        tone:
          type: string
          enum: [professional, casual, urgent, empathetic]
        max_length:
          type: integer
          default: 500
        include_action_items:
          type: boolean
          default: false
      required: [context, tone]
    output_schema:
      type: object
      properties:
        response:
          type: string
        action_items:
          type: array
          items:
            type: string
        suggested_channels:
          type: array
          items:
            type: string
      required: [response]
    error_responses:
      - code: GENERATION_FAILED
        message: Failed to generate response
      - code: CONTENT_FILTERED
        message: Response blocked by content filter

  - name: plan_complex_task
    description: Break down a complex task into subtasks with dependencies
    preferred_executor: powerful_model
    input_schema:
      type: object
      properties:
        task_description:
          type: string
        constraints:
          type: object
          properties:
            deadline:
              type: string
              format: date-time
            budget_hours:
              type: number
            required_skills:
              type: array
              items:
                type: string
        context:
          type: object
          additionalProperties: true
      required: [task_description]
    output_schema:
      type: object
      properties:
        subtasks:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
              description:
                type: string
              estimated_hours:
                type: number
              dependencies:
                type: array
                items:
                  type: string
              priority:
                type: string
                enum: [low, medium, high, critical]
        total_estimated_hours:
          type: number
        critical_path:
          type: array
          items:
            type: string
      required: [subtasks, total_estimated_hours]
    error_responses:
      - code: PLANNING_FAILED
        message: Failed to generate task plan
      - code: CONSTRAINTS_INVALID
        message: Task constraints are invalid

  - name: resolve_conflict
    description: Resolve a detected scheduling conflict with user confirmation
    preferred_executor: code
    input_schema:
      type: object
      properties:
        conflict_id:
          type: string
        resolution_strategy:
          type: string
          enum: [reschedule_first, reschedule_second, cancel_first, cancel_second, suggest_alternatives]
        proposed_time:
          type: string
          format: date-time
          nullable: true
        notify_participants:
          type: boolean
          default: true
      required: [conflict_id, resolution_strategy]
    output_schema:
      type: object
      properties:
        conflict_id:
          type: string
        resolved:
          type: boolean
        resolution_details:
          type: object
          additionalProperties: true
        notifications_sent:
          type: array
          items:
            type: string
      required: [conflict_id, resolved]
    error_responses:
      - code: CONFLICT_NOT_FOUND
        message: Conflict not found
      - code: RESOLUTION_FAILED
        message: Failed to apply resolution strategy
      - code: NOTIFICATION_FAILED
        message: Failed to send notifications

  - name: get_calendar_availability
    description: Get available time slots for scheduling
    preferred_executor: code
    input_schema:
      type: object
      properties:
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        duration_minutes:
          type: integer
          minimum: 15
          maximum: 480
        timezone:
          type: string
          default: UTC
        working_hours_only:
          type: boolean
          default: true
      required: [start_date, end_date, duration_minutes]
    output_schema:
      type: object
      properties:
        available_slots:
          type: array
          items:
            type: object
            properties:
              start:
                type: string
                format: date-time
              end:
                type: string
                format: date-time
        total_slots:
          type: integer
      required: [available_slots, total_slots]
    error_responses:
      - code: INVALID_DATE_RANGE
        message: Invalid date range provided
      - code: NO_SLOTS_AVAILABLE
        message: No available slots found

  - name: create_project
    description: Create a new project
    preferred_executor: code
    input_schema:
      $ref: '#/components/schemas/ProjectCreate'
    output_schema:
      $ref: '#/components/schemas/Project'
    error_responses:
      - code: VALIDATION_ERROR
        message: Project validation failed

  - name: update_project
    description: Update an existing project
    preferred_executor: code
    input_schema:
      type: object
      properties:
        id:
          type: string
        updates:
          $ref: '#/components/schemas/ProjectUpdate'
      required: [id, updates]
    output_schema:
      $ref: '#/components/schemas/Project'
    error_responses:
      - code: PROJECT_NOT_FOUND
        message: Project not found
      - code: VALIDATION_ERROR
        message: Project validation failed

  - name: get_user_context
    description: Retrieve user context for personalization (timezone, preferences, etc.)
    preferred_executor: code
    input_schema:
      type: object
      properties:
        user_id:
          type: string
        include_preferences:
          type: boolean
          default: true
      required: [user_id]
    output_schema:
      type: object
      properties:
        user_id:
          type: string
        timezone:
          type: string
        working_hours:
          type: object
          properties:
            start:
              type: string
            end:
              type: string
        preferences:
          type: object
          additionalProperties: true
        recent_activity:
          type: array
          items:
            type: object
            additionalProperties: true
      required: [user_id, timezone]
    error_responses:
      - code: USER_NOT_FOUND
        message: User not found

components:
  schemas:
    EventCreate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        timezone:
          type: string
          default: UTC
        all_day_flag:
          type: boolean
          default: false
        recurrence_id:
          type: string
          nullable: true
        category:
          type: string
          default: general
      required: [title, start_time, end_time, timezone]

    EventUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        timezone:
          type: string
        all_day_flag:
          type: boolean
        recurrence_id:
          type: string
          nullable: true
        category:
          type: string

    TaskCreate:
      type: object
      properties:
        project_id:
          type: string
        parent_id:
          type: string
          nullable: true
        title:
          type: string
          minLength: 1
          maxLength: 200
        status:
          type: string
          enum: [todo, in_progress, completed, cancelled]
          default: todo
        assignee:
          type: string
          nullable: true
        due_date:
          type: string
          format: date-time
          nullable: true
        estimated_time:
          type: integer
          minimum: 0
          nullable: true
        priority:
          type: string
          enum: [low, medium, high, critical]
          default: medium
        order:
          type: integer
          default: 0
        checklist:
          type: object
          additionalProperties: true
          nullable: true
        category:
          type: string
          default: general
      required: [project_id, title]

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        status:
          type: string
          enum: [todo, in_progress, completed, cancelled]
        assignee:
          type: string
          nullable: true
        due_date:
          type: string
          format: date-time
          nullable: true
        estimated_time:
          type: integer
          minimum: 0
          nullable: true
        priority:
          type: string
          enum: [low, medium, high, critical]
        order:
          type: integer
        checklist:
          type: object
          additionalProperties: true
          nullable: true
        category:
          type: string

    EmailSendRequest:
      type: object
      properties:
        to:
          type: array
          items:
            type: string
            format: email
          minItems: 1
          maxItems: 50
        cc:
          type: array
          items:
            type: string
            format: email
          maxItems: 50
        bcc:
          type: array
          items:
            type: string
            format: email
          maxItems: 50
        subject:
          type: string
          minLength: 1
          maxLength: 200
        body:
          type: string
          minLength: 1
          maxLength: 50000
        attachments:
          type: array
          items:
            type: object
            properties:
              filename:
                type: string
              content:
                type: string
                format: byte
              content_type:
                type: string
            required: [filename, content, content_type]
          maxItems: 10
      required: [to, subject, body]

    SearchRequest:
      type: object
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 1000
        types:
          type: array
          items:
            type: string
            enum: [messages, tasks, events, documents, contacts]
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        cursor:
          type: string
          nullable: true
      required: [query]

    SearchResult:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [message, task, event, document, contact]
        title:
          type: string
        snippet:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 1
        metadata:
          type: object
          additionalProperties: true
      required: [id, type, title, snippet, score]

# Executor Tier Definitions
# - code: Pure deterministic code (database queries, rule engines, schema validators)
# - lightweight_model: Local small models (Qwen3.5 4B, Gemma4 E2B) for simple NLP tasks
# - powerful_model: Cloud models (Sonnet 4.6, Opus 4.7) for complex reasoning
