# Pattern Tags Registry
# Single source of truth for all pattern tag definitions
# See 20-PLAN-INTRO.md for usage context

animation_tags:
  - tag: MotionGuard
    description: Animate transform/opacity only; respects reduced-motion
  - tag: AnimatePresence
    description: Page-level enter/exit transitions
  - tag: Spring
    description: Spring animation (tension≥300, damping≥30)
  - tag: StaggerChildren
    description: Staggered child animations (max 3 children)
  - tag: OpacityFade
    description: Opacity fade ≤150ms
  - tag: Static
    description: No animation
  - tag: PopLayout
    description: Pop-in layout animation
  - tag: LazyMotion
    description: Lazy loading of motion features for code splitting

data_tags:
  - tag: VirtualizeList
    description: Virtualized rendering for large lists
  - tag: InfiniteScroll
    description: Infinite scroll / load-more pattern
  - tag: OptimisticMutation
    description: Immediate UI update with revert on failure; pending state styling
  - tag: InlineEdit
    description: Inline editing triggered by click, with debounced auto-save
  - tag: DebounceAutoSave
    description: 300ms debounce, auto-save on edits
  - tag: HoverPrefetch
    description: Hover triggers data prefetch (200ms debounce)
  - tag: SSEStream
    description: Server-Sent Events for real-time data streaming
  - tag: ChatCache
    description: AI responses cached indefinitely (staleTime:Infinity)

specialized_tags:
  - tag: GenUI
    description: Agent-driven UI component rendering
  - tag: SandboxIframe
    description: Sandboxed iframe for external content
  - tag: Recurring
    description: Recurring event logic (rschedule + Temporal adapter)
  - tag: TimezoneAware
    description: All times displayed in user's timezone
  - tag: TieredMemory
    description: Memory management with retention tiers (working, episodic, semantic)
  - tag: WorkflowExecution
    description: Workflow execution display and state machine
  - tag: A2AFlow
    description: Agent-to-agent communication flow
  - tag: KeyboardShortcuts
