openapi: 3.1.0
info:
  title: AI Command Center API
  description: Multi-tenant AI command center with real-time collaboration, workflow orchestration, and agent management
  version: 1.0.0
  contact:
    name: API Support
    email: api@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.example.com/v1
    description: Production server
  - url: http://localhost:8000/v1
    description: Development server

security:
  - BearerAuth: []
  - OrgHeader: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OrgHeader:
      type: apiKey
      in: header
      name: X-Organization-ID

  schemas:
    # Common Schemas
    Error:
      type: object
      properties:
        code:
          type: string
          description: Error code from taxonomy
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: Human-readable error message
          example: "Request validation failed"
        details:
          type: object
          description: Additional error details
          additionalProperties: true
      required: [code, message]

    ValidationError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
              required: [field, message]

    PaginationMeta:
      type: object
      properties:
        cursor:
          type: string
          nullable: true
          description: Cursor for next page
        limit:
          type: integer
          minimum: 1
          maximum: 100
          description: Items per page
        total:
          type: integer
          minimum: 0
          description: Total items available
      required: [cursor, limit, total]

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            description: Varies by endpoint
        error:
          $ref: '#/components/schemas/Error'
          nullable: true
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required: [data, error, meta]

    # Core Service Schemas
    LiveKitTokenRequest:
      type: object
      properties:
        room_name:
          type: string
          minLength: 1
          maxLength: 100
          description: Room identifier
        permissions:
          type: array
          items:
            type: string
            enum: [join, publish, admin]
          description: Room permissions
        ttl_minutes:
          type: integer
          minimum: 1
          maximum: 1440
          default: 360
          description: Token TTL in minutes
      required: [room_name, permissions]

    LiveKitTokenResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT token for LiveKit room
        url:
          type: string
          format: uri
          description: LiveKit server URL
        expires_at:
          type: string
          format: date-time
          description: Token expiration timestamp
      required: [token, url, expires_at]

    CollabTokenResponse:
      type: object
      properties:
        token:
          type: string
          description: Y-Sweet collaboration token
        document_id:
          type: string
          description: Document identifier
        expires_at:
          type: string
          format: date-time
          description: Token expiration
      required: [token, document_id, expires_at]

    SearchRequest:
      type: object
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 1000
          description: Search query
        types:
          type: array
          items:
            type: string
            enum: [messages, tasks, events, documents, contacts]
          description: Entity types to search
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
          description: Maximum results
        cursor:
          type: string
          nullable: true
          description: Pagination cursor
      required: [query]

    SearchResult:
      type: object
      properties:
        id:
          type: string
          description: Entity ID
        type:
          type: string
          enum: [message, task, event, document, contact]
          description: Entity type
        title:
          type: string
          description: Result title
        snippet:
          type: string
          description: Highlighted snippet
        score:
          type: number
          minimum: 0
          maximum: 1
          description: Relevance score
        metadata:
          type: object
          additionalProperties: true
          description: Type-specific metadata
      required: [id, type, title, snippet, score]

    EmailSendRequest:
      type: object
      properties:
        to:
          type: array
          items:
            type: string
            format: email
          minItems: 1
          maxItems: 50
          description: Recipient emails
        cc:
          type: array
          items:
            type: string
            format: email
          maxItems: 50
          description: CC recipients
        bcc:
          type: array
          items:
            type: string
            format: email
          maxItems: 50
          description: BCC recipients
        subject:
          type: string
          minLength: 1
          maxLength: 200
          description: Email subject
        body:
          type: string
          minLength: 1
          maxLength: 50000
          description: Email body (HTML allowed)
        attachments:
          type: array
          items:
            type: object
            properties:
              filename:
                type: string
              content:
                type: string
                format: byte
                description: Base64 encoded content
              content_type:
                type: string
                description: MIME type
            required: [filename, content, content_type]
          maxItems: 10
          description: File attachments
      required: [to, subject, body]

    McpExecuteRequest:
      type: object
      properties:
        tool_name:
          type: string
          minLength: 1
          maxLength: 100
          description: MCP tool name
        parameters:
          type: object
          additionalProperties: true
          description: Tool parameters (varies by tool)
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 300
          default: 30
          description: Execution timeout
      required: [tool_name, parameters]

    McpExecuteResponse:
      type: object
      properties:
        result:
          type: object
          additionalProperties: true
          description: Tool execution result
        execution_time_ms:
          type: integer
          minimum: 0
          description: Execution time in milliseconds
        success:
          type: boolean
          description: Whether execution succeeded
      required: [result, execution_time_ms, success]

    # Workflow Schemas
    WorkflowExecuteRequest:
      type: object
      properties:
        workflow_id:
          type: string
          description: Workflow definition ID
        input_data:
          type: object
          additionalProperties: true
          description: Initial input data for workflow
        options:
          type: object
          properties:
            parallel_execution:
              type: boolean
              default: true
              description: Enable parallel step execution
            timeout_minutes:
              type: integer
              minimum: 1
              maximum: 60
              default: 30
              description: Workflow timeout
      required: [workflow_id]

    WorkflowStatusResponse:
      type: object
      properties:
        workflow_id:
          type: string
          description: Workflow execution ID
        status:
          type: string
          enum: [pending, running, waiting, completed, failed, cancelled]
          description: Current status
        started_at:
          type: string
          format: date-time
          description: Start timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: Completion timestamp
        steps:
          type: array
          items:
            type: object
            properties:
              step_id:
                type: string
              name:
                type: string
              status:
                type: string
                enum: [pending, running, completed, failed, skipped]
              started_at:
                type: string
                format: date-time
              completed_at:
                type: string
                format: date-time
                nullable: true
              output:
                type: object
                additionalProperties: true
                nullable: true
              error:
                $ref: '#/components/schemas/Error'
                nullable: true
            required: [step_id, name, status]
        result:
          type: object
          additionalProperties: true
          nullable: true
          description: Final workflow result
      required: [workflow_id, status, started_at, updated_at, steps]

    # Agent Management Schemas
    AgentDefinition:
      type: object
      properties:
        id:
          type: string
          description: Agent definition ID
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Agent name
        description:
          type: string
          maxLength: 1000
          description: Agent description
        model:
          type: string
          description: AI model identifier
        system_prompt:
          type: string
          maxLength: 10000
          description: System prompt template
        tools:
          type: array
          items:
            type: string
          description: Available tools
        settings:
          type: object
          additionalProperties: true
          description: Agent-specific settings
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, name, description, model, system_prompt, tools]

    AgentDefinitionCreate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        model:
          type: string
        system_prompt:
          type: string
          maxLength: 10000
        tools:
          type: array
          items:
            type: string
        settings:
          type: object
          additionalProperties: true
      required: [name, description, model, system_prompt, tools]

    AgentEvaluationResponse:
      type: object
      properties:
        agent_id:
          type: string
        evaluation_id:
          type: string
        metrics:
          type: object
          properties:
            accuracy:
              type: number
              minimum: 0
              maximum: 1
            latency_ms:
              type: number
              minimum: 0
            token_usage:
              type: integer
              minimum: 0
            tool_precision:
              type: number
              minimum: 0
              maximum: 1
            hallucination_rate:
              type: number
              minimum: 0
              maximum: 1
          required: [accuracy, latency_ms, token_usage, tool_precision, hallucination_rate]
        passed:
          type: boolean
        evaluated_at:
          type: string
          format: date-time
      required: [agent_id, evaluation_id, metrics, passed, evaluated_at]

    # Guardrails Schemas
    GuardrailsCheckRequest:
      type: object
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 100000
          description: Content to check
        check_type:
          type: string
          enum: [input, output, runtime]
          description: Type of guardrail check
        context:
          type: object
          additionalProperties: true
          description: Additional context for the check
      required: [content, check_type]

    GuardrailsCheckResponse:
      type: object
      properties:
        passed:
          type: boolean
          description: Whether all checks passed
        results:
          type: array
          items:
            type: object
            properties:
              check_type:
                type: string
              passed:
                type: boolean
              confidence:
                type: number
                minimum: 0
                maximum: 1
              details:
                type: object
                additionalProperties: true
              recommendations:
                type: array
                items:
                  type: string
            required: [check_type, passed, confidence]
        blocked_content:
          type: boolean
          description: Whether content should be blocked
        modified_content:
          type: string
          nullable: true
          description: Suggested modified content
      required: [passed, results, blocked_content]

    # Event Schemas
    Event:
      type: object
      properties:
        id:
          type: string
          description: Event ID
        org_id:
          type: string
          description: Organization ID
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Event title
        start_time:
          type: string
          format: date-time
          description: Event start time
        end_time:
          type: string
          format: date-time
          description: Event end time
        timezone:
          type: string
          default: UTC
          description: Event timezone
        all_day_flag:
          type: boolean
          default: false
          description: All-day event flag
        recurrence_id:
          type: string
          nullable: true
          description: Recurrence rule ID
        category:
          type: string
          default: general
          description: Event category
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Soft delete timestamp
      required: [id, org_id, title, start_time, end_time, timezone]

    EventCreate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        timezone:
          type: string
          default: UTC
        all_day_flag:
          type: boolean
          default: false
        recurrence_id:
          type: string
          nullable: true
        category:
          type: string
          default: general
      required: [title, start_time, end_time, timezone]

    EventUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        timezone:
          type: string
        all_day_flag:
          type: boolean
        recurrence_id:
          type: string
          nullable: true
        category:
          type: string

    # Task Schemas
    Task:
      type: object
      properties:
        id:
          type: string
          description: Task ID
        project_id:
          type: string
          description: Project ID
        parent_id:
          type: string
          nullable: true
          description: Parent task ID for subtasks
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Task title
        status:
          type: string
          enum: [todo, in_progress, completed, cancelled]
          default: todo
          description: Task status
        assignee:
          type: string
          nullable: true
          description: Assignee user ID
        due_date:
          type: string
          format: date-time
          nullable: true
          description: Task due date
        estimated_time:
          type: integer
          minimum: 0
          nullable: true
          description: Estimated time in minutes
        priority:
          type: string
          enum: [low, medium, high, critical]
          default: medium
          description: Task priority
        order:
          type: integer
          default: 0
          description: Display order
        checklist:
          type: object
          additionalProperties: true
          nullable: true
          description: Task checklist as JSONB
        category:
          type: string
          default: general
          description: Task category
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Soft delete timestamp
      required: [id, project_id, title, status, priority, order]

    TaskCreate:
      type: object
      properties:
        project_id:
          type: string
        parent_id:
          type: string
          nullable: true
        title:
          type: string
          minLength: 1
          maxLength: 200
        status:
          type: string
          enum: [todo, in_progress, completed, cancelled]
          default: todo
        assignee:
          type: string
          nullable: true
        due_date:
          type: string
          format: date-time
          nullable: true
        estimated_time:
          type: integer
          minimum: 0
          nullable: true
        priority:
          type: string
          enum: [low, medium, high, critical]
          default: medium
        order:
          type: integer
          default: 0
        checklist:
          type: object
          additionalProperties: true
          nullable: true
        category:
          type: string
          default: general
      required: [project_id, title]

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        status:
          type: string
          enum: [todo, in_progress, completed, cancelled]
        assignee:
          type: string
          nullable: true
        due_date:
          type: string
          format: date-time
          nullable: true
        estimated_time:
          type: integer
          minimum: 0
          nullable: true
        priority:
          type: string
          enum: [low, medium, high, critical]
        order:
          type: integer
        checklist:
          type: object
          additionalProperties: true
          nullable: true
        category:
          type: string

    TaskBulkReorder:
      type: object
      properties:
        task_orders:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              order:
                type: integer
            required: [id, order]
          description: Array of task ID and order pairs
      required: [task_orders]

    # Project Schemas
    Project:
      type: object
      properties:
        id:
          type: string
          description: Project ID
        org_id:
          type: string
          description: Organization ID
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Project name
        description:
          type: string
          nullable: true
          description: Project description
        status:
          type: string
          enum: [active, completed, archived, on_hold]
          default: active
          description: Project status
        priority:
          type: string
          enum: [low, medium, high, critical]
          default: medium
          description: Project priority
        start_date:
          type: string
          format: date
          nullable: true
          description: Project start date
        end_date:
          type: string
          format: date
          nullable: true
          description: Project end date
        budget:
          type: number
          format: decimal
          nullable: true
          description: Project budget
        owner:
          type: string
          nullable: true
          description: Project owner user ID
        client_email:
          type: string
          format: email
          nullable: true
          description: Client email
        tags:
          type: array
          items:
            type: string
          description: Project tags
        category:
          type: string
          default: general
          description: Project category
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Soft delete timestamp
      required: [id, org_id, name, status, priority]

    ProjectCreate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, completed, archived, on_hold]
          default: active
        priority:
          type: string
          enum: [low, medium, high, critical]
          default: medium
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
        budget:
          type: number
          format: decimal
          nullable: true
        owner:
          type: string
          nullable: true
        client_email:
          type: string
          format: email
          nullable: true
        tags:
          type: array
          items:
            type: string
        category:
          type: string
          default: general
      required: [name]

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, completed, archived, on_hold]
        priority:
          type: string
          enum: [low, medium, high, critical]
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
        budget:
          type: number
          format: decimal
          nullable: true
        owner:
          type: string
          nullable: true
        client_email:
          type: string
          format: email
          nullable: true
        tags:
          type: array
          items:
            type: string
        category:
          type: string

    # Chat/Thread/Message Schemas
    Thread:
      type: object
      properties:
        id:
          type: string
          description: Thread ID
        org_id:
          type: string
          description: Organization ID
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Thread title
        category:
          type: string
          default: chat
          description: Thread category
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Soft delete timestamp
      required: [id, org_id, title, category]

    ThreadCreate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        category:
          type: string
          default: chat
      required: [title]

    ThreadUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        category:
          type: string

    Message:
      type: object
      properties:
        id:
          type: string
          description: Message ID
        org_id:
          type: string
          description: Organization ID
        thread_id:
          type: string
          description: Thread ID
        user_id:
          type: string
          description: User ID
        content:
          type: string
          minLength: 1
          description: Message content
        category:
          type: string
          default: general
          description: Message category
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Soft delete timestamp
      required: [id, org_id, thread_id, user_id, content, category]

    MessageCreate:
      type: object
      properties:
        thread_id:
          type: string
        content:
          type: string
          minLength: 1
        category:
          type: string
          default: general
      required: [thread_id, content]

    MessageUpdate:
      type: object
      properties:
        content:
          type: string
          minLength: 1
        category:
          type: string

    ChatStreamEvent:
      type: object
      properties:
        event:
          type: string
          enum: [message, error, done]
          description: SSE event type
        data:
          type: object
          additionalProperties: true
          description: Event data (varies by event type)
      required: [event, data]

    # Notification Schemas
    Notification:
      type: object
      properties:
        id:
          type: string
          description: Notification ID
        org_id:
          type: string
          description: Organization ID
        user_id:
          type: string
          description: User ID
        template:
          type: string
          description: Notification template
        deeplink:
          type: string
          nullable: true
          description: Deep link URL
        read_status:
          type: boolean
          default: false
          description: Read status
        unsubscribed:
          type: boolean
          default: false
          description: Unsubscribed status
        category:
          type: string
          default: general
          description: Notification category
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Soft delete timestamp
      required: [id, org_id, user_id, template, read_status, unsubscribed, category]

    NotificationMarkRead:
      type: object
      properties:
        notification_ids:
          type: array
          items:
            type: string
          description: Array of notification IDs to mark as read
      required: [notification_ids]

    NotificationPreferences:
      type: object
      properties:
        id:
          type: string
          description: Preferences ID
        org_id:
          type: string
          description: Organization ID
        user_id:
          type: string
          description: User ID
        channels:
          type: object
          additionalProperties: true
          description: Channel preferences as JSONB
        category:
          type: string
          default: general
          description: Preferences category
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Soft delete timestamp
      required: [id, org_id, user_id, channels, category]

    NotificationPreferencesUpdate:
      type: object
      properties:
        channels:
          type: object
          additionalProperties: true
          description: Channel preferences as JSONB
        category:
          type: string
      required: [channels]

    # Cost Schemas
    AICostLog:
      type: object
      properties:
        id:
          type: string
          description: Cost log ID
        org_id:
          type: string
          description: Organization ID
        request_id:
          type: string
          description: Request ID
        model:
          type: string
          description: AI model used
        tokens_in:
          type: integer
          minimum: 0
          default: 0
          description: Input tokens
        tokens_out:
          type: integer
          minimum: 0
          default: 0
          description: Output tokens
        cost:
          type: number
          format: decimal
          minimum: 0
          default: 0.000000
          description: Cost in USD
        caller:
          type: string
          description: Caller identifier
        category:
          type: string
          default: general
          description: Cost log category
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
      required: [id, org_id, request_id, model, tokens_in, tokens_out, cost, caller, category]

    CostForecast:
      type: object
      properties:
        org_id:
          type: string
          description: Organization ID
        period_start:
          type: string
          format: date-time
          description: Forecast period start
        period_end:
          type: string
          format: date-time
          description: Forecast period end
        forecasted_cost:
          type: number
          format: decimal
          minimum: 0
          description: Forecasted cost
        actual_cost:
          type: number
          format: decimal
          minimum: 0
          nullable: true
          description: Actual cost (if period ended)
        model_breakdown:
          type: array
          items:
            type: object
            properties:
              model:
                type: string
              cost:
                type: number
                format: decimal
                minimum: 0
            required: [model, cost]
          description: Cost breakdown by model
      required: [org_id, period_start, period_end, forecasted_cost]

    # Auth/Org Schemas
    Organization:
      type: object
      properties:
        id:
          type: string
          description: Organization ID
        slug:
          type: string
          description: Organization slug
        name:
          type: string
          description: Organization name
        plan:
          type: string
          enum: [free, pro, enterprise]
          default: free
          description: Organization plan
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        allow_training_flag:
          type: boolean
          default: false
          description: Allow AI training flag
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
      required: [id, slug, name, plan]

    OrganizationCreate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        slug:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '^[a-z0-9-]+$'
        plan:
          type: string
          enum: [free, pro, enterprise]
          default: free
      required: [name, slug]

    OrganizationUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        plan:
          type: string
          enum: [free, pro, enterprise]
        allow_training_flag:
          type: boolean

    OrganizationSwitch:
      type: object
      properties:
        org_id:
          type: string
          description: Target organization ID
      required: [org_id]

    PasskeyEnrollment:
      type: object
      properties:
        user_id:
          type: string
          description: User ID
        credential_id:
          type: string
          description: WebAuthn credential ID
        public_key:
          type: string
          description: Public key
        counter:
          type: integer
          minimum: 0
          description: Signature counter
        transports:
          type: array
          items:
            type: string
          description: Allowed transports
      required: [user_id, credential_id, public_key, counter]

    PasskeyChallenge:
      type: object
      properties:
        challenge:
          type: string
          description: WebAuthn challenge
        timeout:
          type: integer
          minimum: 1
          default: 60000
          description: Challenge timeout in milliseconds
        rp_id:
          type: string
          description: Relying party ID
        user_id:
          type: string
          description: User ID
      required: [challenge, rp_id, user_id]

    Session:
      type: object
      properties:
        id:
          type: string
          description: Session ID
        user_id:
          type: string
          description: User ID
        org_id:
          type: string
          description: Current organization ID
        created_at:
          type: string
          format: date-time
          description: Session creation timestamp
        expires_at:
          type: string
          format: date-time
          description: Session expiration timestamp
        last_activity:
          type: string
          format: date-time
          description: Last activity timestamp
      required: [id, user_id, org_id, created_at, expires_at]

paths:
  # Core Service Endpoints
  /livekit/token:
    post:
      tags: [Core Services]
      summary: Generate LiveKit token
      description: Generate LiveKit token with scoped permissions, TTL 6 hours
      security:
        - BearerAuth: []
        - OrgHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiveKitTokenRequest'
      responses:
        '200':
          description: Token generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveKitTokenResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collab/token:
    get:
      tags: [Core Services]
      summary: Get collaboration token
      description: Y-Sweet collaboration token with organization verification
      security:
        - BearerAuth: []
        - OrgHeader: []
      parameters:
        - name: document_id
          in: query
          required: true
          schema:
            type: string
        - name: permissions
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [read, write, admin]
      responses:
        '200':
          description: Token retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollabTokenResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /search:
    get:
      tags: [Core Services]
      summary: Unified search
      description: Unified search using pg_trgm, tsvector, and vector indexes
      security:
        - BearerAuth: []
        - OrgHeader: []
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: types
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [messages, tasks, events, documents, contacts]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
            nullable: true
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/SearchResult'
        '400':
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /email/send:
    post:
      tags: [Core Services]
      summary: Send email
      description: Send email via Nylas through FastAPI proxy
      security:
        - BearerAuth: []
        - OrgHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailSendRequest'
      responses:
        '200':
          description: Email sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message_id:
                    type: string
