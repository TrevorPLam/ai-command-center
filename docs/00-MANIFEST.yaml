# === Tiered Loading Protocol ===

# Session Starter (always load):
# Target: <3K tokens total
# - plan/00-RULES.yaml (governance - rules)
# - plan/01-PLAN-DECISIONS.md (governance - decisions)
# - plan/10-STRAT-PRD.md (plan - product vision)
# - plan/11-STRAT-BLUEPRINT.md (plan - architecture framework)
# - plan/30-ARCH-OVERVIEW.md (architecture - C4 overview)
# - 1/TASKS.md (governance - task checklist)
# - 1/MD.md (governance - markdown guidelines)
#
# These provide the essential context: what rules apply, what decisions are active,
# what we're building, the product vision, high-level architecture, current tasks,
# and markdown formatting standards.

# Task-Specific (on-demand):
# Load when working on specific domains:
# - Frontend work: plan/100-FRONTEND-RULES.md, plan/01-PLAN-ZUSTAND.md
# - Database work: plan/31-ARCH-DATABASE.md, plan/32-arch-database-schema.sql
# - API work: plan/33-ARCH-ENDPOINTS.md, plan/34-arch-endpoints-schema.yaml
# - Security work: plan/35-ARCH-SECURITY.md
# - AI work: plan/60-AI-CORE.md
# - Testing work: plan/70-TESTING.md
# - Operations work: plan/80-OPS-MANUAL.md, plan/80-OPS-PERFORMANCE.md
# - Planning work: plan/21-PLAN-MILESTONES.md, plan/22-PLAN-ADR-INDEX.md, plan/23-PLAN-QUESTIONS.md
# - Dependencies: plan/51-XCT-DEPENDENCIES.md, plan/versions.yaml
# - Components: plan/40-COMP-REGISTRY.md
# - Services: plan/50-XCT-INDEX.md
# - Planning docs: planning-docs/*.md

# Deep Reference (never):
# Load only when explicitly requested:
# - plan/90-REF-KNOWLEDGE.md (external references, CVE details, etc.)
# - plan/12-STRAT-HORIZON.md (future scanning)
# - plan/36-ARCH-TECH-VALIDATION.md (deep tech validation)
