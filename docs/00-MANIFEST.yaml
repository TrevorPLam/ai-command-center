# Documentation Manifest
# Tiered loading protocol for AI agents to minimize token usage
#
# Load tiers:
# - always: Session Starter set loaded at session start (target <3K tokens)
# - on-demand: Loaded when task-specific context is needed
# - never: Reference material, loaded only when explicitly requested
#
# File types:
# - governance: Decision logs, rules, process documents
# - architecture: System design, database, security, deployment
# - plan: Strategy, milestones, ADRs, questions
# - spec: Component specs, API contracts, test plans
# - reference: Knowledge base, external references

